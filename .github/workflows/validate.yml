name: Validate Marketplace

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'README.md'
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**'
      - 'scripts/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'README.md'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check plugin source accessibility
        run: python3 scripts/validate_marketplace.py

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.7"

      - name: Verify uv.lock is in sync with pyproject.toml
        run: uv lock --check

      - name: Validate marketplace and plugins
        run: uv run --extra test pytest -v
