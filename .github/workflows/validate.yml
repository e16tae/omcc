name: Validate Marketplace

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**'
      - 'scripts/validate_marketplace.py'
      - 'tests/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**'
      - 'scripts/validate_marketplace.py'
      - 'tests/**'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  validate-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - name: Check plugin source accessibility
        run: python3 scripts/validate_marketplace.py

  validate-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Validate marketplace and plugins
        run: uv run --extra test pytest -v
