name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_branch: ${{ steps.parse.outputs.pr_branch }}
    steps:
      - id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: parse
        env:
          PRS_JSON: ${{ steps.release.outputs.prs }}
        run: |
          # release-please-action v4 always emits prs as a JSON array string
          # (possibly empty). Fall back to '[]' if the output is absent.
          branch=$(echo "${PRS_JSON:-[]}" | jq -r '.[0].headBranchName // empty')
          if [ -n "$branch" ]; then
            echo "pr_branch=$branch" >> "$GITHUB_OUTPUT"
          fi

  sync-lockfile:
    needs: release-please
    if: needs.release-please.outputs.pr_branch != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check for RELEASE_PAT
        id: check-pat
        env:
          PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::warning title=RELEASE_PAT not configured::Auto lockfile sync requires RELEASE_PAT secret. See README for setup."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.check-pat.outputs.configured == 'true'
        with:
          ref: ${{ needs.release-please.outputs.pr_branch }}
          token: ${{ secrets.RELEASE_PAT }}

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        if: steps.check-pat.outputs.configured == 'true'
        with:
          version: "0.11.7"

      - name: Regenerate uv.lock for bumped version
        if: steps.check-pat.outputs.configured == 'true'
        run: |
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock already in sync; nothing to commit"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add uv.lock
          git commit -m "chore(ci): sync lockfile with version bump"
          git push origin HEAD:${{ needs.release-please.outputs.pr_branch }}
